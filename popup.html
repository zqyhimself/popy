<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Popy</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="dot"></span>
        <span class="name">Popy</span>
        <span class="ver">v2.0</span>
      </div>
      <div class="header-actions">
        <a class="icon-btn" id="open-github" href="https://github.com/zqyhimself/popy" target="_blank" rel="noopener" title="GitHub">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <button class="icon-btn" id="open-options" title="设置">⚙</button>
      </div>
    </header>

    <section class="toggles">
      <div class="row">
        <div class="label">
          <div class="title">全局启用</div>
          <div class="sub">对所有网站生效</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="global-toggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="row">
        <div class="label">
          <div class="title">当前站点启用</div>
          <div class="sub" id="host-label">--</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="site-toggle" />
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-blocks">0</div>
        <div class="stat-label">本页拦截</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-history">0</div>
        <div class="stat-label">历史条目</div>
      </div>
    </section>

    <section class="actions">
      <button class="action" data-action="open-history">📋 剪贴板历史</button>
      <button class="action" data-action="reveal">👁 揭示隐藏</button>
      <button class="action" data-action="copy-md">✨ 选区→MD</button>
      <button class="action" data-action="open-options">⚙️ 更多设置</button>
    </section>

    <footer>
      <div class="tip">Alt+C · Alt+Shift+C · Alt+Shift+H · Alt+Shift+V</div>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
